<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clima & Look Ideal</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .card { background: white; padding: 20px; margin: 20px auto; width: 360px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);} 
    .roupa { margin-bottom: 20px; }
    img { width: 100%; border-radius: 10px; margin-top: 8px; background: #ddd; height: 200px; object-fit: cover; }
    button { padding: 8px 16px; border: none; border-radius: 8px; background: #ff5722; color: white; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

<h1>Look baseado no clima</h1>
<input type="text" id="city" placeholder="Digite sua cidade">
<button onclick="getWeather()">Buscar</button>

<div id="result"></div>

<script>

const API_KEY = "59a3522220c6150eb141521453317663";

// ESTRUTURA PRONTA PARA IMAGENS (SEM LINKS AINDA)
const imagens = {
  "casaco pesado": ["img/CASACO_PESADO.jfif"],
  "cachecol": ["img/CACHECOL.jpg"],
  "bota": ["img/BOTA.jpg"],
  "jaqueta": ["img/JAQUETA.jfif"],
  "calça jeans": ["img/CALCA_JEANS.jfif"],
  "tênis": ["img/TENIS.jpg"],
  "camiseta": ["img/CAMISA.jpg"],
  "calça leve": ["img/CALCA_LEVE.jfif"],
  "tênis casual": ["img/TENIS_CASUAL.jpg"],
  "regata": ["img/REGATA.jfif"],
  "shorts": ["img/SHORTS - Copia.jpg"],
  "chinelo": ["img/CHINELO.jfif"],
  "capa de chuva": ["img/CAPA_DE_CHUVA.png"]
};

async function getWeather() {
  const city = document.getElementById('city').value;

  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=pt_br`);
    if (!res.ok) throw new Error("Erro ao buscar clima");

    const data = await res.json();
    const temp = data.main.temp;
    const clima = data.weather[0].main;

    let roupas = [];

    if (temp < 10) {
      roupas = ["casaco pesado","cachecol","bota"];
    } else if (temp < 18) {
      roupas = ["jaqueta","calça jeans","tênis"];
    } else if (temp < 25) {
      roupas = ["camiseta","calça leve","tênis casual"];
    } else {
      roupas = ["regata","shorts","chinelo"];
    }

    if (clima.toLowerCase().includes("rain")) {
      roupas.push("capa de chuva");
    }

    let htmlRoupas = "";

    roupas.forEach((nome) => {
      let imgs = imagens[nome] || [""];

      let imgsHtml = "";
      imgs.forEach(src => {
        imgsHtml += `<img src="${src}" alt="sem imagem">`;
      });

      htmlRoupas += `
        <div class="roupa">
          <p><strong>${nome}</strong></p>
          ${imgsHtml}
          <button onclick="buscarShopee('${nome}')">Comprar</button>
        </div>
      `;
    });

    document.getElementById('result').innerHTML = `
      <div class="card">
        <h2>${city}</h2>
        <p>${temp}°C</p>
        ${htmlRoupas}
      </div>
    `;

  } catch (err) {
    document.getElementById('result').innerHTML = `<p>Erro: ${err.message}</p>`;
  }
}

function buscarShopee(termo) {
  const url = `https://shopee.com.br/search?keyword=${encodeURIComponent(termo)}`;
  window.open(url, '_blank');
}

</script>

</body>
</html>
